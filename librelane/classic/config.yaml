# GF180MCU LibreLane config -- classic flow for the picorv32_hello_top macro
meta:
  version: 3
  flow: Classic
  substituting_steps:
    # Skip Yosys unmapped cells check as it incorrectly flags submodules due to them starting with $ (e.g. $paramod$...)
    # Also even if it didn't flag it, it wouldn't check submodules for unmapped cells
    Checker.YosysUnmappedCells: null

    # Ignore yosys warnings about signal used by no driver
    # Warning: Wire $paramod$1.../small_sync_fifo.sv:53$1261 [31] is used but has no driver.
    # TODO: figure out why yosys is sad
    Checker.YosysSynthChecks: null

    # Why is this checker broken?
    # Probably submodules???????
    # OpenROAD.CheckMacroInstances: null
    # Disable KLayout DRC
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null
    # Disable KLayout antenna check
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null
    # Disable KLayout density check
    #KLayout.Density: null
    #Checker.KLayoutDensity: null
    # Save time during development
    # Enable for sign-off
    #OpenROAD.IRDropReport: null
    #Magic.DRC: null
    #Checker.MagicDRC: null
    #KLayout.XOR: null
    #Netgen.LVS: null
    #Checker.LVS: null

DESIGN_NAME: picorv32_hello_top
VERILOG_FILES:
  - dir::../../src/rtl/picorv32_hello_top.sv
  - dir::../../src/rtl/ram_ss.sv
  - dir::../../src/rtl/sync.sv
  - dir::../../src/rtl/picorv32.v
  - dir::../../src/wrappers/sram1024x8_wrapper.sv

# VERILOG_INCLUDE_DIRS:
  # - dir::../src/rtl/inc

# Enable plugin for better SystemVerilog support
# USE_SLANG: true
# SLANG_ARGUMENTS: ['--keep-hierarchy']

# SYNTH_HIERARCHY_MODE: keep
SYNTH_AUTONAME: true # human readable names
SYNTH_SIZING: true
SYNTH_ABC_DFF: true
# SYNTH_ABC_USE_MFS3: true
SYNTH_STRATEGY: "DELAY 2"

# Baseline die: 1310x1150 (23.1% below the original 1400x1400 die).
# The configuration below is the proven congestion-mitigation recipe from
# `irdrop_check_d`: detailed routing completed and the IR-drop report passed.
FP_SIZING: absolute
DIE_AREA: [0.0, 0.0, 1310, 1150]

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# SDC files
PNR_SDC_FILE: dir::../../src/rtl/picorv32_hello_top.sdc
SIGNOFF_SDC_FILE: dir::../../src/rtl/picorv32_hello_top.sdc
FALLBACK_SDC: dir::../../src/rtl/picorv32_hello_top.sdc

# Power / ground nets
VDD_NETS:
  - VDD
GND_NETS:
  - VSS

# Clock -- direct port on this macro, no I/O pad in this flow
CLOCK_PORT: clk
CLOCK_PERIOD: 62.5 # 16MHz

# Routing / ESD
DIODE_ON_PORTS: in
# Moved to Metal5 to relieve Metal3 congestion at 1310x1150 (see TRIAL_NOTES.md).
# Normally capped at Metal4 because Metal5 is reserved for the parent's core
# ring in hierarchical integration (PDN_CORE_RING: false below) -- Metal5
# ownership still needs to be cleared with the parent integration owner.
RT_MAX_LAYER: Metal5

CTS_OBSTRUCTION_AWARE: true
CTS_DELAY_BUFFER_DERATE_PCT: 100
CTS_BALANCE_LEVELS: true
CTS_CLK_MAX_WIRE_LENGTH: 0
CTS_DISTANCE_BETWEEN_BUFFERS: 0
CTS_SINK_CLUSTERING_SIZE: 20
CTS_SINK_CLUSTERING_MAX_DIAMETER: 60
CTS_APPLY_NDR: none

# Cell names in this library are clkbuf_<N>, not clkbuf_x<N>.
# The "X12" in the datasheet title is the drive-strength description,
# not part of the cell name. Give CTS more than one size to pick from.
CTS_CLK_BUFFERS:
  - "gf180mcu_fd_sc_mcu7t5v0__clkbuf_4"
  - "gf180mcu_fd_sc_mcu7t5v0__clkbuf_8"
  - "gf180mcu_fd_sc_mcu7t5v0__clkbuf_12"
  - "gf180mcu_fd_sc_mcu7t5v0__clkbuf_16"

# Fix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.6
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.5

# Pre-routing setup repair (fixes timing before route guides exist, unlike
# the RUN_POST_GRT_* flags which are gated off by default and hung on this
# design's tighter density -- see TRIAL_NOTES.md). Modeled on the adjacent
# trouper repo's RUN_POST_GPL_DESIGN_REPAIR / GRT_RESIZER_SETUP_MAX_BUFFER_PCT.
RUN_POST_GPL_DESIGN_REPAIR: true
RUN_POST_CTS_RESIZER_TIMING: true
PL_RESIZER_SETUP_MAX_BUFFER_PCT: 40

# Placement
# The 1310x1150 `irdrop_check_d` baseline used 68% target density and a
# relaxed fanout limit to avoid excessive buffering.
PL_TARGET_DENSITY_PCT: 68
MAX_FANOUT_CONSTRAINT: 16
GRT_ALLOW_CONGESTION: true
GRT_ADJUSTMENT: 0.2
GPL_CELL_PADDING: 2
DPL_CELL_PADDING: 2

# These delay buffers materially worsen routing congestion at this die size.
DONT_USE_CELLS:
  - gf180mcu_fd_sc_mcu7t5v0__dlyb_1
  - gf180mcu_fd_sc_mcu7t5v0__dlyb_2
  - gf180mcu_fd_sc_mcu7t5v0__dlyb_4

# Fix antenna violations after DRT
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10 # %
PL_MAX_DISPLACEMENT_X: 800
PL_MAX_DISPLACEMENT_Y: 500

# ---------------------------------------------------------------------------
# PDN
#
# The SRAM obstructs Metal1/Metal2/Metal3 across its whole interior and exposes
# VDD/VSS only on a ~3um Metal3 perimeter frame. Metal4 is unobstructed, so it
# is the only layer that can carry power over the macros.
# ---------------------------------------------------------------------------

PDN_MULTILAYER: true
PDN_ENABLE_RAILS: true
PDN_RAIL_LAYER:       Metal1    # gf180mcu std cells expose VDD/VSS on Metal1
PDN_VERTICAL_LAYER:   Metal4    # carries over the SRAMs
# General mesh horizontal layer moved off Metal3 to relieve routing
# congestion there (see pdn_cfg.tcl). SRAM taps stay on Metal3 regardless --
# that's hardcoded in pdn_cfg.tcl, not driven by this variable. Metal5 is
# normally reserved for a hierarchical parent's core ring; using it for our
# own mesh here is a real ownership question, not yet cleared -- see
# TRIAL_NOTES.md.
PDN_HORIZONTAL_LAYER: Metal5


# Straps
PDN_VWIDTH:    5         
PDN_HWIDTH:    5          
PDN_VPITCH:    180
PDN_HPITCH:    180
PDN_VSPACING:  85        # (180 - 2*5) / 2
PDN_HSPACING:  85        # (180 - 2*5) / 2
PDN_EXTEND_TO: boundary   

PDN_ENABLE_PINS:     true    # Metal3/Metal4 pins for the parent to grab
PDN_CORE_RING:       false   # hierarchical integration; coordinate Metal5 use with parent
PDN_HORIZONTAL_HALO: 10
PDN_VERTICAL_HALO:   10

PDN_CFG: dir::/pdn_cfg.tcl

# ---------------------------------------------------------------------------
# Corners
#
# gf180mcu_fd_sc_mcu7t5v0 is characterized at 3v30 as well as 5v00 -- the
# "5v0" in the library name is the device flavour, not a mandatory rail.
# The SRAM is 3.3V only, so the whole macro signs off at 3.3V.
# ---------------------------------------------------------------------------
DEFAULT_CORNER: nom_tt_025C_3v30
STA_CORNERS:
  - nom_tt_025C_3v30
  - min_ff_n40C_3v60
  - max_ss_125C_3v00

LIB:
  "*_tt_025C_3v30":
    - /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_sc_mcu7t5v0/lib/gf180mcu_fd_sc_mcu7t5v0__tt_025C_3v30.lib
  "*_ss_125C_3v00":
    - /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_sc_mcu7t5v0/lib/gf180mcu_fd_sc_mcu7t5v0__ss_125C_3v00.lib
  "*_ff_n40C_3v60":
    - /foss/pdks/gf180mcuD/libs.ref/gf180mcu_fd_sc_mcu7t5v0/lib/gf180mcu_fd_sc_mcu7t5v0__ff_n40C_3v60.lib

# Due to OpenROAD bug
# https://github.com/The-OpenROAD-Project/OpenROAD/issues/8229
#PL_TIME_DRIVEN: False
#PL_ROUTABILITY_DRIVEN: False

# Do not error on magic DRC violations
# Note: Passing magic DRC is not required for the submission.
# However, it is recommended to fix or carefully review all violations.
ERROR_ON_MAGIC_DRC: False

# Prevent false positive DRC errors in I/O cells
MAGIC_GDS_FLATGLOB:
# For contacts
- "*_CDNS_*"
# Foundry provided SRAMs
- "*$$*"
- "M1_N*"
- "M1_P*"
- "M2_M1*"
- "M3_M2*"
- "nmos_5p0*"
- "nmos_1p2*"
- "pmos_5p0*"
- "pmos_1p2*"
- "via1_*"
- "ypass_gate*"
- "G_ring_*"
# These additional cells must be flattened to get rid of 3.3V devices
# (DUALGATE drawn into high-level cells)
- "dcap_103*"
- "din_*"
- "mux821_*"
- "rdummy_*"
- "pmoscap_*"
- "xdec_*"
- "ypredec*"
- "xpredec*"
- "prexdec_*"
- "xdec8_*"
- "xdec16_*"
- "xdec32_*"
- "sa_*"

# Since we cannot meet the minimum density limit on Metal2,
# ignore active metal on previous and subsequent layers
# (DM.5_DM.7 and DM.4_DM.6). Dummy metal is moved to active
# metal during the precheck.
KLAYOUT_FILLER_OPTIONS:
  Metal2_ignore_active: true

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

MACROS:
  gf180mcu_ocd_ip_sram__sram1024x8m8wm1:
    gds:
      - dir::../../ip/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.gds
    lef:
      - dir::../../ip/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.lef
    vh:
      - dir::../../ip/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__blackbox_pp.v
    instances:
      # SIZE 301.300 BY 515.810 ; native (unrotated) footprint: 301.3(X) x 515.81(Y).
      # Row of 4 along the bottom-right of the die: right edge of the last macro
      # is flush with the die edge (x=1400, 0 margin -- too tight for any std
      # cell row to fit), so the whole row is pushed as far right as possible.
      # Left margin absorbs the remainder: 1400 - (4*301.3 + 3*20) = 134.8um.
      #
      # y=25 with FP_MACRO_VERTICAL_HALO=10 cuts rows from y=15, which is below
      # the core floor at y=15.68. No orphaned rows survive beneath the macros.
      #
      # Orientation S (rather than N) so the pin row -- which sits on the native
      # y=0 edge of the cell -- faces up into the core instead of the die edge.
      # 20um gap between macros == FP_MACRO_HORIZONTAL_HALO on each side, so
      # halos meet without overlapping.
      "u_ram_ss.gen_macro_ram.gen_sram[0].u_wrapper.u_sram_macro":
        location: [22.4, 25]
        orientation: S
      "u_ram_ss.gen_macro_ram.gen_sram[1].u_wrapper.u_sram_macro":
        location: [343.7, 25]
        orientation: S
      "u_ram_ss.gen_macro_ram.gen_sram[2].u_wrapper.u_sram_macro":
        location: [665.0, 25]
        orientation: S
      "u_ram_ss.gen_macro_ram.gen_sram[3].u_wrapper.u_sram_macro":
        location: [986.3, 25]
        orientation: S

    lib:
      "*": # default fallback -- matches every corner in STA_CORNERS
        - dir::../../ip/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__tt_025C_3v30.lib

# This is an alternative method compared to
# specifying the power connections in the RTL
PDN_MACRO_CONNECTIONS:
- ".*u_sram_macro VDD VSS VDD VSS"

# Halo size around macros while cutting rows.
# Workaround for: https://github.com/The-OpenROAD-Project/OpenROAD/issues/8868
FP_MACRO_HORIZONTAL_HALO: 10
FP_MACRO_VERTICAL_HALO: 10
