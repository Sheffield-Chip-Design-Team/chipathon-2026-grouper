name: Setup DV environment
description: >
  Installs the pinned fusesoc/cocotb/pyuvm/edalize versions from
  requirements-dv.txt and registers this repo's FuseSoC libraries. Assumes
  actions/checkout has already run in the calling job, and that Verilator
  is already on PATH - the calling job is expected to run inside the
  ghcr.io/.../dv-verilator container image (see .github/workflows/dv-ci.yml
  and .github/docker/dv-verilator/) rather than building it from source
  here; that used to happen in this action but made every parallel matrix
  leg redundantly build Verilator from source on a cold cache.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: requirements-dv.txt

    - name: Install pinned Python DV toolchain
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r requirements-dv.txt
        pip install -e .

    - name: Register FuseSoC libraries
      shell: bash
      run: |
        fusesoc library add grouper_soc .
        fusesoc library add https://github.com/Sheffield-Chip-Design-Team/picorv32
        fusesoc library update picorv32
