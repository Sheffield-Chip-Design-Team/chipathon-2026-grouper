name: Setup DV environment
description: >
  Installs the pinned fusesoc/cocotb/pyuvm/edalize versions from
  requirements-dv.txt and registers this repo's FuseSoC libraries. Assumes
  actions/checkout has already run in the calling job, and that Verilator
  plus a system python3/pip3 are already available - the calling job is
  expected to run inside the ghcr.io/.../dv-verilator container image (see
  .github/workflows/sim-ci.yml and .github/docker/dv-verilator/) rather than
  building Verilator from source or using actions/setup-python here; both
  used to happen in this action, but building Verilator made every parallel
  matrix leg redundantly rebuild it from source on a cold cache, and
  actions/setup-python's downloaded Python doesn't work inside this minimal
  a container (fails with "spawn .../pip ENOENT" - confirmed via a real CI
  run), so we rely on the image's own python3 instead.

runs:
  using: composite
  steps:
    - name: Install pinned Python DV toolchain
      shell: bash
      run: |
        # Ubuntu 24.04's system Python is PEP 668 externally-managed; this
        # container only ever runs this one throwaway CI job, so there's no
        # "other system packages" to protect it from.
        pip3 install --upgrade pip --break-system-packages
        pip3 install -r requirements-dv.txt --break-system-packages
        pip3 install -e . --break-system-packages

    - name: Register FuseSoC libraries
      shell: bash
      run: |
        fusesoc library add grouper_soc .
        fusesoc library add https://github.com/Sheffield-Chip-Design-Team/picorv32
        fusesoc library update picorv32
