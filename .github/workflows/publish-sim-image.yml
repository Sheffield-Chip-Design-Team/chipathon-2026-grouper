name: Publish Simulation Image

on:
  push:
    branches: [main]
    paths:
      - .github/docker/sim/**
      - .github/verilator-version
      - .github/workflows/publish-dv-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: |
          echo "version=$(cat .github/verilator-version)" >> "$GITHUB_OUTPUT"
          # ghcr.io requires a lowercase path; github.repository preserves case
          # (e.g. Sheffield-Chip-Design-Team/... ), so lowercase it ourselves.
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/dv-verilator" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github/docker/dv-verilator
          build-args: |
            VERILATOR_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
